<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Conserveira — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f0e6d0;
      --gold:  #c9a84c;
      --black: #000000;
    }

    html, body {
      min-height: 100%;
      background: var(--black);
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 10;
      opacity: 0.4;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 3rem 2rem;
    }

    .logo {
      width: min(520px, 85vw);
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    .divider {
      width: min(320px, 60vw);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 2.8rem 0 2.4rem;
      opacity: 0;
      animation: fadeIn 1s ease 1s forwards;
    }

    .coming-soon {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--cream);
      text-align: center;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
    }

    .tagline-pt {
      margin-top: 1rem;
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--cream);
      text-align: center;
      opacity: 0;
      animation: fadeUp 1s ease 1.4s forwards;
    }

    .tagline-en {
      margin-top: 0.4rem;
      font-size: clamp(0.85rem, 1.8vw, 1.05rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      font-style: italic;
      color: var(--gold);
      text-align: center;
      opacity: 0;
      animation: fadeUp 1s ease 1.65s forwards;
    }

    /* Email form wrapper */
    .form-wrapper {
      margin-top: 2.5rem;
      width: min(420px, 90vw);
      opacity: 0;
      animation: fadeUp 1s ease 2s forwards;
    }

    /* Override Brevo styles to match our design */
    .sib-form {
      background-color: transparent !important;
      padding: 0 !important;
    }
    #sib-container {
      background-color: transparent !important;
      border: 1px solid rgba(201, 168, 76, 0.35) !important;
      border-radius: 2px !important;
      padding: 1.5rem !important;
      max-width: 100% !important;
    }
    .sib-form-block p {
      display: none; /* hide "Newsletter" title and description */
    }
    .sib-form-block:has(p[style*="32px"]) { display: none; }
    .sib-form-block:has(p[style*="16px"]) { display: none; }

    .entry__label {
      color: var(--cream) !important;
      font-family: 'Cormorant Garamond', serif !important;
      font-size: 0.85rem !important;
      font-weight: 300 !important;
      letter-spacing: 0.1em !important;
      text-transform: uppercase !important;
    }
    .input {
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(201, 168, 76, 0.4) !important;
      border-radius: 1px !important;
      color: var(--cream) !important;
      font-family: 'Cormorant Garamond', serif !important;
      font-size: 1rem !important;
      padding: 0.7rem 1rem !important;
    }
    .input::placeholder { color: rgba(240,230,208,0.35) !important; }
    .input:focus { outline: none !important; border-color: var(--gold) !important; }

    .sib-form-block__button {
      background-color: transparent !important;
      border: 1px solid var(--gold) !important;
      border-radius: 1px !important;
      color: var(--gold) !important;
      font-family: 'Playfair Display', serif !important;
      font-size: 0.85rem !important;
      font-weight: 400 !important;
      letter-spacing: 0.25em !important;
      padding: 0.75rem 2rem !important;
      cursor: pointer !important;
      transition: background 0.3s, color 0.3s !important;
      width: 100% !important;
    }
    .sib-form-block__button:hover {
      background-color: var(--gold) !important;
      color: var(--black) !important;
    }

    #success-message {
      background-color: rgba(7, 82, 41, 0.2) !important;
      border-color: var(--gold) !important;
      color: var(--cream) !important;
    }
    #error-message {
      background-color: rgba(102, 29, 29, 0.2) !important;
    }

    .dots {
      display: flex;
      gap: 0.5rem;
      margin-top: 2.5rem;
      opacity: 0;
      animation: fadeIn 1s ease 2.3s forwards;
    }
    .dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.5;
    }
    .dot:nth-child(2) { opacity: 0.8; }
    .dot:nth-child(3) { opacity: 0.5; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
